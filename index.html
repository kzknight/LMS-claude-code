<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주요 명언 모음</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Georgia', serif;
      color: #fff;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e2b96f;
      margin-bottom: 40px;
      text-align: center;
      font-weight: 300;
    }

    .quote-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(226, 185, 111, 0.3);
      border-radius: 16px;
      padding: 50px 60px;
      max-width: 700px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      transition: all 0.5s ease;
      position: relative;
    }

    .quote-card::before {
      content: '\201C';
      position: absolute;
      top: 10px;
      left: 24px;
      font-size: 6rem;
      color: rgba(226, 185, 111, 0.2);
      line-height: 1;
      font-family: Georgia, serif;
    }

    .quote-text {
      font-size: 1.4rem;
      line-height: 1.8;
      color: #f0e6d3;
      margin-bottom: 28px;
      font-style: italic;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease;
    }

    .quote-author {
      font-size: 1rem;
      color: #e2b96f;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-style: normal;
      font-family: 'Arial', sans-serif;
      transition: opacity 0.4s ease;
    }

    .quote-author::before {
      content: '— ';
    }

    .divider {
      width: 60px;
      height: 1px;
      background: rgba(226, 185, 111, 0.5);
      margin: 20px auto;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      margin-top: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 32px;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Arial', sans-serif;
      letter-spacing: 1px;
    }

    .btn-next {
      background: linear-gradient(135deg, #e2b96f, #c9943a);
      color: #1a1a2e;
      font-weight: bold;
    }

    .btn-next:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(226, 185, 111, 0.4);
    }

    .btn-random {
      background: transparent;
      color: #e2b96f;
      border: 1px solid rgba(226, 185, 111, 0.6);
    }

    .btn-random:hover {
      background: rgba(226, 185, 111, 0.1);
      transform: translateY(-2px);
    }

    .counter {
      margin-top: 24px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 2px;
      font-family: 'Arial', sans-serif;
    }

    .fade-out {
      opacity: 0;
    }

    @media (max-width: 600px) {
      .quote-card {
        padding: 40px 28px;
      }
      .quote-text {
        font-size: 1.15rem;
      }
      h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <h1>노력 명언</h1>

  <div class="quote-card">
    <p class="quote-text" id="quoteText"></p>
    <div class="divider"></div>
    <p class="quote-author" id="quoteAuthor"></p>
  </div>

  <div class="btn-group">
    <button class="btn-next" onclick="nextQuote()">다음 명언</button>
    <button class="btn-random" onclick="randomQuote()">랜덤 명언</button>
  </div>

  <p class="counter" id="counter"></p>

  <script>
    const quotes = [
      { text: "천재는 1%의 영감과 99%의 노력으로 이루어진다.", author: "토머스 에디슨" },
      { text: "노력하는 사람은 즐기는 사람을 이길 수 없다.", author: "공자" },
      { text: "성공은 매일 반복하는 작은 노력들의 합이다.", author: "로버트 콜리어" },
      { text: "재능은 연습 없이는 아무것도 아니다. 연습이 곧 전부다.", author: "말콤 글래드웰" },
      { text: "위대한 일은 갑자기 이루어지지 않는다. 한 걸음 한 걸음 쌓인 노력이 위대함을 만든다.", author: "에픽테토스" },
      { text: "노력은 배신하지 않는다. 포기하지 않는 한 실패란 없다.", author: "조지 해리슨" },
      { text: "오늘 할 수 있는 일에 최선을 다하라. 그것이 내일을 준비하는 최선의 방법이다.", author: "마하트마 간디" },
      { text: "힘든 일을 하려는 의지가 바로 성공과 실패를 가르는 차이다.", author: "스티브 프레스필드" },
      { text: "피땀 흘린 노력만이 운명을 바꿀 수 있다.", author: "마이클 조던" },
      { text: "나무를 자르는 데 6시간이 주어진다면, 나는 4시간을 도끼를 가는 데 쓰겠다.", author: "에이브러햄 링컨" },
    ];

    let currentIndex = 0;

    function updateQuote(index) {
      const textEl = document.getElementById('quoteText');
      const authorEl = document.getElementById('quoteAuthor');
      const counterEl = document.getElementById('counter');

      textEl.classList.add('fade-out');
      authorEl.classList.add('fade-out');

      setTimeout(() => {
        textEl.textContent = quotes[index].text;
        authorEl.textContent = quotes[index].author;
        counterEl.textContent = `${index + 1} / ${quotes.length}`;

        textEl.classList.remove('fade-out');
        authorEl.classList.remove('fade-out');
      }, 400);
    }

    function nextQuote() {
      currentIndex = (currentIndex + 1) % quotes.length;
      updateQuote(currentIndex);
    }

    function randomQuote() {
      let newIndex;
      do {
        newIndex = Math.floor(Math.random() * quotes.length);
      } while (newIndex === currentIndex && quotes.length > 1);
      currentIndex = newIndex;
      updateQuote(currentIndex);
    }

    // 초기 로드
    updateQuote(currentIndex);
  </script>

</body>
</html>
